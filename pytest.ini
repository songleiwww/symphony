# 测试配置文件
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --cov=. --cov-report=term-missing

[tool:coverage:run]
source = .
omit = 
    tests/*
    */__pycache__/*
    */site-packages/*

[tool:coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError

[tool:black]
line-length = 100
target-version = ['py39', 'py310', 'py311']

[tool:isort]
profile = black
line_length = 100
