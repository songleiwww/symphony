## 任务路由规则（强制执行）
routing_rules:
  # 优先使用免费代理的任务类型
  use_free_proxy_for:
    - "coordination": 跨模型协调、任务分发、结果汇总
    - "scheduling": 任务调度、优先级分配、资源编排
    - "light_query": 普通查询、信息整理、格式转换
    - "code_review": 代码检查、语法校验、文档生成
    - "pre_analysis": 前置分析、问题分类、复杂度评估

  # 仅允许使用主模型的任务类型（高复杂度，免费模型无法胜任）
  use_main_model_only:
    - "core_architecture_design": 核心架构设计、复杂算法研发
    - "deep_reasoning": 深度推理、数学/逻辑难题求解
    - "security_audit": 安全审计、漏洞挖掘、敏感数据处理
    - "production_deployment": 生产环境部署、核心配置修改

## 统计规则
token_tracking:
  # 每日统计免费模型节省的Token数量
  enable_tracking: true
  log_path: "logs/free_proxy_token_savings.log"
  # 当免费模型不可用时，最多降级使用1次主模型，然后立即告警
  main_model_fallback_limit: 1
